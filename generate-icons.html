<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VolumeHub Icon Generator</title>
  <style>
    body { font-family: sans-serif; padding: 24px; background: #f4f5f7; }
    h1 { color: #6c63ff; margin-bottom: 20px; }
    .icons { display: flex; gap: 32px; align-items: flex-end; flex-wrap: wrap; }
    .icon-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    canvas { border-radius: 20%; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
    a { display: block; padding: 6px 14px; background: #6c63ff; color: #fff;
        border-radius: 6px; text-decoration: none; font-size: 13px; }
    a:hover { opacity: .85; }
    p { color: #555; font-size: 14px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <h1>VolumeHub Icon Generator</h1>
  <p>Click each download link and save the file into the <code>icons/</code> folder, replacing the existing files.</p>
  <div class="icons" id="icons"></div>

  <script>
    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');
      const s = size;

      // Purple rounded-rect background
      const r = s * 0.18;
      ctx.fillStyle = '#6c63ff';
      ctx.beginPath();
      ctx.roundRect(0, 0, s, s, r);
      ctx.fill();

      // Scale the 24×24 SVG speaker icon to fit with padding
      const pad  = s * 0.14;
      const area = s - pad * 2;
      ctx.save();
      ctx.translate(pad, pad);
      ctx.scale(area / 24, area / 24);

      // Speaker body + cone  (M3 9v6h4l5 5V4L7 9H3z)
      ctx.fillStyle = '#ffffff';
      const body = new Path2D('M3 9v6h4l5 5V4L7 9H3z');
      ctx.fill(body);

      // Inner arc — partial fill so smaller sizes stay readable
      ctx.globalAlpha = 0.9;
      const inner = new Path2D('M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z');
      ctx.fill(inner);

      // Outer arc — only on 48 and 128 (too noisy at 16)
      if (size >= 48) {
        ctx.globalAlpha = 0.65;
        const outer = new Path2D('M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z');
        ctx.fill(outer);
      }

      ctx.restore();
      return canvas;
    }

    const container = document.getElementById('icons');

    [16, 48, 128].forEach(size => {
      const canvas = drawIcon(size);
      const dataUrl = canvas.toDataURL('image/png');

      const wrap = document.createElement('div');
      wrap.className = 'icon-wrap';

      const label = document.createElement('div');
      label.style.cssText = 'font-size:12px;color:#666;';
      label.textContent = `${size}×${size}`;

      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = `icon-${size}.png`;
      a.textContent = `↓ icon-${size}.png`;

      wrap.append(canvas, label, a);
      container.appendChild(wrap);
    });
  </script>
</body>
</html>
